<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="content">       
        <span class="badge">Kizuna Hub</span>

           <h1>
             The Future of African Talent Starts Here
           </h1>

           <p>
             Join thousands of creators waiting for Kizuna Hub.
           </p>

         <input 
          type="email"
          placeholder="Register your Email"
          required>

        <button type="submit">Grow with Kizuna</button>

        <div class="stats">
            <div>
                <h2>30K+</h2>
                <p>Users Waiting</p>
            </div>

            <div>
                <h2>20+</h2>
                <p>Countries</p>
            </div>

            <div>
                <h2>99%</h2>
                <p>Satisfaction</p>
            </div>
        </div>
    </div>

    <div id="popup" class="popup">
    <div class="popup-content">
        <span id="closePopup">&times;</span>

        <h2>🎉 Successfully Joined!</h2>

        <p>You have successfully joined the Kizuna Hub waitlist.</p>

        <h3 id="rankText"></h3>

        <button id="okBtn">Awesome!</button>
    </div>
</div>

<script src="kizuna.js"></script>
</body>
</html>
